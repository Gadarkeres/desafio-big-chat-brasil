services:
  postgres:
    image: postgres:16-alpine
    container_name: bcb-postgres
    environment:
      POSTGRES_DB: big_chat_brasil
      POSTGRES_USER: bcb_user
      POSTGRES_PASSWORD: bcb_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bcb_user -d big_chat_brasil"]
      interval: 5s
      timeout: 5s
      retries: 10

  back-end:
    build:
      context: ./back-end
    container_name: bcb-api
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/big_chat_brasil
      DB_USERNAME: bcb_user
      DB_PASSWORD: bcb_password
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  front-end:
    build:
      context: ./front-end
      args:
        VITE_API_URL: http://localhost:8080
    container_name: bcb-front-end
    ports:
      - "5173:80"
    depends_on:
      - back-end

volumes:
  postgres_data:
